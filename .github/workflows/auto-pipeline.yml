name: Auto-Pipeline — PRD to Site

on:
  issues:
    types: [labeled]

jobs:
  build-site:
    if: github.event.label.name == 'prd-intake'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Save issue body to file
        run: |
          cat > /tmp/prd-input.txt << 'ISSUEBODY'
          ${{ github.event.issue.body }}
          ISSUEBODY

      - name: Parse PRD
        id: parse
        run: node pipeline/auto/parse-prd.mjs /tmp/prd-input.txt > /tmp/parsed-prd.json
        continue-on-error: true

      - name: Generate seed
        id: seed
        run: |
          if [ -f /tmp/parsed-prd.json ] && [ -s /tmp/parsed-prd.json ]; then
            node pipeline/auto/generate-seed.mjs /tmp/parsed-prd.json > examples/bellas-bistro/seed/seed.json
          else
            echo "No parsed data — using default seed"
          fi
        continue-on-error: true

      - name: Install deps
        run: |
          cd examples/bellas-bistro
          npm ci

      - name: Build site
        id: build
        run: |
          cd examples/bellas-bistro
          npx astro build
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          npm install -g wrangler
          PROJECT="shipyard-auto-${{ github.event.issue.number }}"
          wrangler pages project create $PROJECT --production-branch main 2>/dev/null || true
          DEPLOY_OUT=$(wrangler pages deploy examples/bellas-bistro/dist/client --project-name $PROJECT --branch main --commit-dirty=true 2>&1)
          echo "$DEPLOY_OUT"
          URL=$(echo "$DEPLOY_OUT" | grep -o 'https://[^ ]*' | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const parse = '${{ steps.parse.outcome }}';
            const seed = '${{ steps.seed.outcome }}';
            const build = '${{ steps.build.outcome }}';
            const deploy = '${{ steps.deploy.outcome }}';
            const url = '${{ steps.deploy.outputs.url }}' || 'N/A';

            const icon = s => s === 'success' ? '✅' : '❌';
            const body = [
              '## Auto-Pipeline Results',
              '',
              '| Step | Status |',
              '|------|--------|',
              `| Parse PRD | ${icon(parse)} ${parse} |`,
              `| Generate Seed | ${icon(seed)} ${seed} |`,
              `| Build Site | ${icon(build)} ${build} |`,
              `| Deploy | ${icon(deploy)} ${deploy} |`,
              '',
              deploy === 'success' ? `🚀 **Live at:** ${url}` : '⚠️ Deploy failed — check workflow logs.',
              '',
              '_Built by Shipyard AI auto-pipeline_'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body
            });
