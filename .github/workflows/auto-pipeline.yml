name: Auto Pipeline

on:
  issues:
    types: [labeled]

jobs:
  auto-pipeline:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'prd-intake')

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract issue body
        id: issue
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat << 'ISSUE_BODY'
          ${{ github.event.issue.body }}
          ISSUE_BODY
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Parse PRD with Shipyard Worker
        id: parse
        run: |
          parsed=$(node pipeline/auto/parse-prd.mjs "${{ steps.issue.outputs.body }}")
          echo "data<<EOF" >> $GITHUB_OUTPUT
          echo "$parsed" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate seed.json
        id: seed
        if: steps.parse.outcome == 'success'
        run: |
          seed_path=$(node pipeline/auto/generate-seed.mjs '${{ steps.parse.outputs.data }}')
          echo "path=$seed_path" >> $GITHUB_OUTPUT
          echo "Generated seed at: $seed_path"

      - name: Install dependencies
        if: steps.seed.outcome == 'success'
        run: npm ci

      - name: Build with Astro
        if: steps.seed.outcome == 'success'
        run: npx astro build --root examples/bellas-bistro
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        if: steps.seed.outcome == 'success'
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy examples/bellas-bistro/dist --project-name=shipyard-auto --branch=${{ github.event.issue.number }}
          # Extract the deployed URL (wrangler output format varies)
          deployed_url="https://shipyard-auto-${{ github.event.issue.number }}.pages.dev"
          echo "url=$deployed_url" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment on issue with results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parseSuccess = '${{ steps.parse.outcome }}' === 'success';
            const seedSuccess = '${{ steps.seed.outcome }}' === 'success';
            const deploySuccess = '${{ steps.deploy.outcome }}' === 'success';
            const deployUrl = '${{ steps.deploy.outputs.url }}';

            let comment = '## Auto-Pipeline Status\n\n';

            if (parseSuccess) {
              comment += '✅ **PRD Parsing**: Extracted business data successfully\n';
            } else {
              comment += '❌ **PRD Parsing**: Failed to parse PRD from issue body\n';
            }

            if (seedSuccess) {
              comment += '✅ **Seed Generation**: Generated seed.json successfully\n';
            } else {
              comment += '❌ **Seed Generation**: Failed to generate seed.json\n';
            }

            if (deploySuccess && deployUrl) {
              comment += `✅ **Deployment**: Site deployed successfully!\n\n`;
              comment += `🚀 **Live URL**: [${deployUrl}](${deployUrl})\n`;
            } else {
              comment += '❌ **Deployment**: Failed to deploy site\n';
            }

            comment += '\n---\n';
            comment += `*Auto-pipeline triggered by \`prd-intake\` label on issue #${context.issue.number}*\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
