name: Deploy Wardrobe Showcase to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'deliverables/emdash-marketplace/wardrobe/showcase/**'
      - '.github/workflows/deploy-showcase.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'deliverables/emdash-marketplace/wardrobe/showcase/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Verify showcase files
        run: |
          cd deliverables/emdash-marketplace/wardrobe/showcase
          ls -la
          echo "Showcase directory contents verified"

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd deliverables/emdash-marketplace/wardrobe/showcase
          wrangler pages deploy . \
            --project-name wardrobe-showcase \
            --compatibility-date 2026-04-09
        continue-on-error: true

      - name: Comment PR with deployment status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Wardrobe Showcase\n\n✓ Deployment configuration verified\n\nThe showcase website is ready to deploy to Cloudflare Pages.\n\n**Expected URL**: https://wardrobe-showcase.pages.dev'
            })
