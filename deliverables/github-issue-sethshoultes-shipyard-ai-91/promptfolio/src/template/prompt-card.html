<article class="prompt-card {{cardClass}}" id="{{promptId}}">
  <h2 class="prompt-title">{{promptTitle}}</h2>
  <div class="prompt-body">{{promptBody}}</div>
  {{promptImages}}
  <div class="prompt-actions">
    <button class="btn btn-copy" onclick="copyPrompt('{{promptId}}')">
      Copy
    </button>
  </div>
</article>
