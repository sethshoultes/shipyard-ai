name = "wardrobe-analytics"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# KV namespace for storing analytics events and aggregated stats
# Created via: wrangler kv:namespace create ANALYTICS
[[kv_namespaces]]
binding = "ANALYTICS"
id = "501ca8a74075b6eb1ccde44b6a7826d5"
preview_id = "b0d7a870e649ed51ec9af992278c30b8"

# Environment variables (secrets should be set via wrangler secret put)
[vars]
CORS_ORIGIN = "https://wardrobe.emdash.dev"

# Production environment
[env.production]
name = "wardrobe-analytics"
[[env.production.kv_namespaces]]
binding = "ANALYTICS"
id = "501ca8a74075b6eb1ccde44b6a7826d5"

# Staging environment
[env.staging]
name = "wardrobe-analytics-staging"
[[env.staging.kv_namespaces]]
binding = "ANALYTICS"
id = "61de5f9a5472eae4129a915d2e8ce399"

# Note: Set API_KEY secret using:
# wrangler secret put API_KEY
