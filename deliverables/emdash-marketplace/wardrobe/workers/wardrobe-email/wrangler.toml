name = "wardrobe-email"
main = "src/index.ts"
compatibility_date = "2026-03-29"
compatibility_flags = ["nodejs_compat"]

# KV Namespace for storing email subscribers
[[kv_namespaces]]
binding = "EMAILS"
id = "PLACEHOLDER_REPLACE_WITH_REAL_KV_ID"
preview_id = "PLACEHOLDER_REPLACE_WITH_REAL_KV_ID"

[env.production]
# Replace with actual KV namespace IDs after running:
# wrangler kv:namespace create EMAILS
# wrangler kv:namespace create EMAILS --preview

[[env.production.kv_namespaces]]
binding = "EMAILS"
id = "PLACEHOLDER_REPLACE_WITH_REAL_KV_ID"
