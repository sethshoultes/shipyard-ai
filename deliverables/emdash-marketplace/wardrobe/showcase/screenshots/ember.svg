<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background: Dark navy -->
  <rect width="400" height="400" fill="#1a2332"/>

  <!-- Accent stripe: Burnt orange -->
  <rect x="0" y="0" width="400" height="60" fill="#d97d4a"/>

  <!-- Theme title -->
  <text x="30" y="120" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff">
    Ember
  </text>

  <!-- Description text -->
  <text x="30" y="170" font-family="Georgia, serif" font-size="18" fill="#d97d4a">
    Bold. Editorial.
  </text>

  <!-- Magazine-style accent -->
  <line x1="30" y1="190" x2="370" y2="190" stroke="#d97d4a" stroke-width="3"/>

  <!-- Content preview -->
  <rect x="30" y="220" width="340" height="140" fill="none" stroke="#666" stroke-width="2"/>
  <text x="40" y="250" font-family="Georgia, serif" font-size="16" fill="#aaa">
    Your content looks beautiful here.
  </text>
  <text x="40" y="280" font-family="Georgia, serif" font-size="14" fill="#666">
    Magazine typography. Editorial voice.
  </text>
</svg>