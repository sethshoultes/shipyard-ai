<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background: Clean white -->
  <rect width="400" height="400" fill="#ffffff"/>

  <!-- Blue accent bar -->
  <rect x="0" y="0" width="400" height="50" fill="#0066cc"/>

  <!-- Theme title -->
  <text x="30" y="110" font-family="Arial, sans-serif" font-size="44" font-weight="600" fill="#2c3e50">
    Slate
  </text>

  <!-- Subtitle -->
  <text x="30" y="145" font-family="Arial, sans-serif" font-size="14" fill="#0066cc">
    Professional. Trustworthy.
  </text>

  <!-- Divider -->
  <line x1="30" y1="165" x2="370" y2="165" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Content grid -->
  <rect x="30" y="185" width="160" height="140" fill="#f5f5f5" stroke="#0066cc" stroke-width="1"/>
  <text x="45" y="220" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#2c3e50">
    Clean Design
  </text>
  <text x="45" y="245" font-family="Arial, sans-serif" font-size="11" fill="#666">
    Structured layout
  </text>
  <text x="45" y="305" font-family="Arial, sans-serif" font-size="11" fill="#666">
    System fonts
  </text>

  <rect x="210" y="185" width="160" height="140" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="225" y="220" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#2c3e50">
    Trust First
  </text>
  <text x="225" y="245" font-family="Arial, sans-serif" font-size="11" fill="#666">
    Professional palette
  </text>
  <text x="225" y="305" font-family="Arial, sans-serif" font-size="11" fill="#666">
    Gray + Blue
  </text>
</svg>