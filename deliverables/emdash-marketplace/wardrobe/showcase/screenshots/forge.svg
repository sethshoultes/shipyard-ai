<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background: Dark -->
  <rect width="400" height="400" fill="#0d1117"/>

  <!-- Terminal-style accent line: Neon green -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#39d353" stroke-width="2"/>

  <!-- Theme title -->
  <text x="30" y="120" font-family="Monaco, monospace" font-size="42" font-weight="bold" fill="#39d353">
    Forge
  </text>

  <!-- Terminal prompt -->
  <text x="30" y="170" font-family="Monaco, monospace" font-size="16" fill="#8b949e">
    $ wardrobe install forge
  </text>

  <!-- Code-style content -->
  <rect x="30" y="200" width="340" height="160" fill="#161b22" stroke="#39d353" stroke-width="1"/>
  <text x="40" y="230" font-family="Monaco, monospace" font-size="13" fill="#39d353">
    ▸ Dark mode enabled
  </text>
  <text x="40" y="255" font-family="Monaco, monospace" font-size="13" fill="#79c0ff">
    ▸ Terminal inspired
  </text>
  <text x="40" y="280" font-family="Monaco, monospace" font-size="13" fill="#a371f7">
    ▸ Built for builders
  </text>
  <text x="40" y="330" font-family="Monaco, monospace" font-size="12" fill="#6e7681">
    One command. Full transformation.
  </text>
</svg>