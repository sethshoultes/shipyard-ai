<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background: Cream -->
  <rect width="400" height="400" fill="#f5eee4"/>

  <!-- Terracotta accent top -->
  <rect x="0" y="0" width="400" height="50" fill="#c97a5c" rx="0"/>

  <!-- Rounded card container (Bloom aesthetic) -->
  <rect x="20" y="80" width="360" height="300" rx="24" fill="#ffffff" stroke="#e8d5c4" stroke-width="2"/>

  <!-- Theme title -->
  <text x="50" y="140" font-family="'Trebuchet MS', sans-serif" font-size="46" font-weight="600" fill="#d4704f">
    Bloom
  </text>

  <!-- Warm description -->
  <text x="50" y="175" font-family="'Trebuchet MS', sans-serif" font-size="14" fill="#c97a5c">
    Warm and inviting.
  </text>

  <!-- Decorative rounded shape -->
  <circle cx="360" cy="130" r="35" fill="#e8d5c4" opacity="0.5"/>

  <!-- Content with warm tones -->
  <text x="50" y="230" font-family="'Trebuchet MS', sans-serif" font-size="13" fill="#5c5c5c">
    Community feels at home.
  </text>

  <text x="50" y="260" font-family="'Trebuchet MS', sans-serif" font-size="13" fill="#8b7355">
    Rounded corners, warm accents.
  </text>

  <!-- Small terracotta accent dots (decorative) -->
  <circle cx="60" cy="310" r="4" fill="#c97a5c"/>
  <circle cx="80" cy="310" r="4" fill="#c97a5c"/>
  <circle cx="100" cy="310" r="4" fill="#c97a5c"/>
</svg>