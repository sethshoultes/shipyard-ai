<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <!-- Warm background circle -->
  <circle cx="400" cy="400" r="350" fill="#C4704B" opacity="0.06"/>
  <circle cx="400" cy="400" r="260" fill="#D4A853" opacity="0.06"/>

  <!-- Plate -->
  <ellipse cx="400" cy="480" rx="200" ry="40" fill="#C4704B" opacity="0.15"/>
  <ellipse cx="400" cy="470" rx="180" ry="180" fill="none" stroke="#C4704B" stroke-width="3"/>
  <ellipse cx="400" cy="470" rx="150" ry="150" fill="none" stroke="#C4704B" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="400" cy="470" rx="120" ry="120" fill="none" stroke="#D4A853" stroke-width="1" opacity="0.4"/>

  <!-- Pasta swirl -->
  <path d="M360 440 C360 400, 400 380, 400 420 C400 460, 440 440, 440 400 C440 360, 400 350, 380 380" stroke="#C4704B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M370 450 C380 420, 410 400, 420 430 C430 460, 440 430, 430 410" stroke="#D4A853" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M390 460 C390 440, 410 430, 415 445" stroke="#C4704B" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Wine glass -->
  <g transform="translate(580, 280)">
    <path d="M-30 0 C-30 50, 30 50, 30 0 C30 -30, -30 -30, -30 0Z" fill="#D4A853" opacity="0.2" stroke="#D4A853" stroke-width="2"/>
    <path d="M-22 0 C-22 35, 22 35, 22 0 C22 -15, -22 -15, -22 0Z" fill="#C4704B" opacity="0.25"/>
    <line x1="0" y1="50" x2="0" y2="90" stroke="#D4A853" stroke-width="2"/>
    <ellipse cx="0" cy="92" rx="22" ry="5" fill="none" stroke="#D4A853" stroke-width="2"/>
  </g>

  <!-- Fork -->
  <g transform="translate(230, 320) rotate(-25)">
    <line x1="0" y1="0" x2="0" y2="140" stroke="#D4A853" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="-10" y2="40" stroke="#D4A853" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#D4A853" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="0" x2="10" y2="40" stroke="#D4A853" stroke-width="2" stroke-linecap="round"/>
    <path d="M-10 0 Q-10 -8, -6 -10" stroke="#D4A853" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M0 0 Q0 -10, 0 -12" stroke="#D4A853" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M10 0 Q10 -8, 6 -10" stroke="#D4A853" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Steam wisps -->
  <path d="M370 290 C365 270, 375 260, 370 240" stroke="#C4704B" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M400 280 C395 255, 405 245, 400 220" stroke="#C4704B" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M430 290 C425 270, 435 260, 430 240" stroke="#C4704B" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Decorative herb -->
  <g transform="translate(480, 400) rotate(15)">
    <path d="M0 0 C10 -15, 25 -20, 30 -35" stroke="#6B8F5E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M5 -8 C15 -12, 18 -20, 20 -28" stroke="#6B8F5E" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>
</svg>
