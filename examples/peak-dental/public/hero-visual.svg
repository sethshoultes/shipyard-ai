<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <!-- Background circles -->
  <circle cx="400" cy="400" r="350" fill="#0891B2" opacity="0.04"/>
  <circle cx="400" cy="400" r="260" fill="#22C55E" opacity="0.04"/>

  <!-- Tooth silhouette -->
  <g transform="translate(400, 380)">
    <path d="M-60 -80 C-60 -130, -30 -150, 0 -150 C30 -150, 60 -130, 60 -80 C60 -40, 50 0, 40 40 C35 65, 25 100, 20 120 C15 135, 5 140, 0 140 C-5 140, -15 135, -20 120 C-25 100, -35 65, -40 40 C-50 0, -60 -40, -60 -80Z"
      fill="#0891B2" opacity="0.08" stroke="#0891B2" stroke-width="2.5"/>
    <path d="M-40 -80 C-40 -110, -20 -125, 0 -125 C20 -125, 40 -110, 40 -80 C40 -60, 30 -40, 0 -35 C-30 -40, -40 -60, -40 -80Z"
      fill="#0891B2" opacity="0.06"/>
    <path d="M0 40 C0 60, -5 80, -10 110" stroke="#0891B2" stroke-width="1.5" opacity="0.4" fill="none" stroke-linecap="round"/>
    <path d="M0 40 C0 60, 5 80, 10 110" stroke="#0891B2" stroke-width="1.5" opacity="0.4" fill="none" stroke-linecap="round"/>
    <path d="M-15 -100 L-12 -90 L-8 -100 L-12 -95Z" fill="#22C55E" opacity="0.5"/>
    <circle cx="15" cy="-95" r="3" fill="#22C55E" opacity="0.4"/>
  </g>

  <!-- Smile arc -->
  <path d="M280 560 C320 600, 400 620, 480 600 C520 590, 520 560, 520 560"
    stroke="#0891B2" stroke-width="2" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Orbit lines -->
  <circle cx="400" cy="400" r="200" fill="none" stroke="#0891B2" stroke-width="1" opacity="0.1" stroke-dasharray="8 12"/>
  <circle cx="400" cy="400" r="280" fill="none" stroke="#22C55E" stroke-width="0.8" opacity="0.08" stroke-dasharray="4 16"/>

  <!-- Shield checkmark -->
  <g transform="translate(560, 260)">
    <path d="M0 -35 L25 -22 L25 5 C25 25, 0 40, 0 40 C0 40, -25 25, -25 5 L-25 -22Z"
      fill="#22C55E" opacity="0.12" stroke="#22C55E" stroke-width="1.5"/>
    <path d="M-8 2 L-2 10 L10 -6" stroke="#22C55E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Medical plus signs -->
  <g opacity="0.15">
    <g transform="translate(250, 280)">
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(300, 580)">
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(550, 500)">
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#0891B2" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#0891B2" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Accent dots -->
  <circle cx="300" cy="350" r="3" fill="#0891B2" opacity="0.1"/>
  <circle cx="520" cy="420" r="2.5" fill="#22C55E" opacity="0.1"/>
  <circle cx="340" cy="500" r="2" fill="#0891B2" opacity="0.08"/>
  <circle cx="480" cy="300" r="2" fill="#22C55E" opacity="0.08"/>
</svg>
